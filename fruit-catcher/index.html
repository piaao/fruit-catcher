<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍎 水果吃货 - Fruit Catcher</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
  }
  #gameWrapper {
    position: relative;
    width: 800px;
    height: 600px;
  }
  canvas {
    display: block;
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(100,200,255,0.3), 0 0 80px rgba(100,200,255,0.1);
    cursor: none;
  }
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 14px 20px;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #hud.active { opacity: 1; }
  .hud-panel {
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 6px 14px;
    backdrop-filter: blur(6px);
  }
  .hud-label { font-size: 11px; color: #aaa; letter-spacing: 1px; text-transform: uppercase; }
  .hud-value { font-size: 22px; font-weight: 700; color: #fff; line-height: 1.1; }
  #scoreVal { color: #ffd700; }
  #timerVal { color: #ff6b6b; }
  #timerVal.warning { animation: pulse 0.5s infinite alternate; color: #ff3333; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.75);
    border-radius: 16px;
    backdrop-filter: blur(4px);
    z-index: 20;
    gap: 16px;
    transition: opacity 0.3s;
  }
  .overlay.hidden { display: none; }
  .overlay h1 { font-size: 48px; font-weight: 900; text-shadow: 0 0 20px currentColor; }
  .overlay h2 { font-size: 28px; font-weight: 700; color: #ccc; }
  .overlay p  { font-size: 15px; color: #999; max-width: 400px; text-align: center; line-height: 1.6; }
  .btn {
    padding: 12px 36px;
    font-size: 18px;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
  }
  .btn:hover { transform: scale(1.06); box-shadow: 0 0 24px rgba(255,255,255,0.3); }
  .btn-primary { background: linear-gradient(135deg, #f7971e, #ffd200); color: #222; }
  .btn-success { background: linear-gradient(135deg, #56ab2f, #a8e063); color: #fff; }
  .btn-danger  { background: linear-gradient(135deg, #ff416c, #ff4b2b); color: #fff; }
  .fruit-legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 4px;
  }
  .fruit-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: #ccc;
  }
  .fruit-item span:first-child { font-size: 20px; }
  #levelInfo {
    position: absolute;
    top: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 4px 16px;
    font-size: 13px;
    color: #aaa;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #levelInfo.active { opacity: 1; }
  #levelInfo b { color: #ffd700; }
  /* 屏幕震动 */
  #gameWrapper.shake {
    animation: shakeAnim 0.4s ease-out;
  }
  @keyframes shakeAnim {
    0%   { transform: translate(0,0) rotate(0); }
    10%  { transform: translate(-12px,6px) rotate(-1deg); }
    20%  { transform: translate(10px,-8px) rotate(1deg); }
    30%  { transform: translate(-8px,4px) rotate(-0.5deg); }
    40%  { transform: translate(6px,-3px) rotate(0.5deg); }
    60%  { transform: translate(-3px,2px) rotate(0); }
    100% { transform: translate(0,0) rotate(0); }
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <div id="hud">
    <div class="hud-panel">
      <div class="hud-label">关卡</div>
      <div class="hud-value" id="levelVal">1</div>
    </div>
    <div class="hud-panel">
      <div class="hud-label">得分</div>
      <div class="hud-value" id="scoreVal">0</div>
    </div>
    <div class="hud-panel">
      <div class="hud-label">目标</div>
      <div class="hud-value" id="targetVal" style="color:#a8e063">100</div>
    </div>
    <div class="hud-panel">
      <div class="hud-label">剩余</div>
      <div class="hud-value" id="timerVal">45</div>
    </div>
  </div>
  <div id="levelInfo">第 <b id="levelName">1</b> 关 — <b id="levelDesc">热身关</b></div>

  <!-- 开始界面 -->
  <div class="overlay" id="startScreen">
    <h1 style="color:#ffd700">🍎 水果吃货</h1>
    <h2>Fruit Catcher</h2>
    <p>水果从四周射来——用<b style="color:#fff">鼠标</b>控制角色头部朝向，让水果碰到头部即可吃掉！<br>
       越<b style="color:#a8e063">轻</b>的水果分数越高，但飞行越快！每关<b style="color:#fff">45秒</b>，达到目标分数过关。<br>
       <b style="color:#ff6b6b">小心炸弹💣</b>！碰到会扣15分并产生爆炸！</p>
    <div class="fruit-legend">
      <div class="fruit-item"><span>🍉</span><span>西瓜 +1分（最重·最慢）</span></div>
      <div class="fruit-item"><span>🍊</span><span>橙子 +3分</span></div>
      <div class="fruit-item"><span>🍎</span><span>苹果 +5分</span></div>
      <div class="fruit-item"><span>🍇</span><span>葡萄 +8分</span></div>
      <div class="fruit-item"><span>🍓</span><span>草莓 +12分</span></div>
      <div class="fruit-item"><span>🫐</span><span>蓝莓 +20分（最轻·最快）</span></div>
      <div class="fruit-item"><span>💣</span><span style="color:#ff6b6b">炸弹 -15分</span></div>
    </div>
    <button class="btn btn-primary" id="btnStart">开始游戏</button>
  </div>

  <!-- 过关界面 -->
  <div class="overlay hidden" id="winScreen">
    <h1 style="color:#a8e063">🎉 过关！</h1>
    <h2 id="winMsg"></h2>
    <p id="winDetail"></p>
    <div style="display:flex;gap:12px">
      <button class="btn btn-success" id="btnNext">下一关 →</button>
      <button class="btn btn-primary" id="btnRestart1">重新开始</button>
    </div>
  </div>

  <!-- 失败界面 -->
  <div class="overlay hidden" id="loseScreen">
    <h1 style="color:#ff6b6b">💀 失败！</h1>
    <h2 id="loseMsg"></h2>
    <p id="loseDetail"></p>
    <button class="btn btn-danger" id="btnRetry">再试一次</button>
    <button class="btn btn-primary" id="btnRestart2">回到开始</button>
  </div>

  <!-- 通关界面 -->
  <div class="overlay hidden" id="clearScreen">
    <h1 style="color:#ffd700">🏆 全部通关！</h1>
    <h2 id="clearMsg"></h2>
    <p id="clearDetail"></p>
    <button class="btn btn-primary" id="btnRestart3">再玩一次</button>
  </div>
</div>

<script>
/* ==========================================================
   水果吃货 - 完整重写版
   ========================================================== */

// ==================== 常量 ====================
const W = 800, H = 600;
const CX = W / 2, CY = H / 2;

// 水果定义
const FRUITS = [
  { name:'蓝莓', emoji:'🫐', weight:0.05, score:20, radius:12, speedMult:3.2 },
  { name:'草莓', emoji:'🍓', weight:0.15, score:12, radius:16, speedMult:2.5 },
  { name:'葡萄', emoji:'🍇', weight:0.3,  score: 8, radius:18, speedMult:2.0 },
  { name:'苹果', emoji:'🍎', weight:0.8,  score: 5, radius:22, speedMult:1.5 },
  { name:'橙子', emoji:'🍊', weight:1.5,  score: 3, radius:26, speedMult:1.1 },
  { name:'西瓜', emoji:'🍉', weight:5.0,  score: 1, radius:34, speedMult:0.7 },
];

// 炸弹
const BOMB = { name:'炸弹', emoji:'💣', score:-15, radius:24, speedMult:1.8 };

// 关卡
const LEVELS = [
  { name:'热身关', target: 60,  baseSpeed:110, spawnInterval:1800, bombChance:0.08 },
  { name:'加速关', target:130,  baseSpeed:140, spawnInterval:1500, bombChance:0.10 },
  { name:'密集关', target:220,  baseSpeed:160, spawnInterval:1100, bombChance:0.12 },
  { name:'狂乱关', target:340,  baseSpeed:190, spawnInterval: 850, bombChance:0.15 },
  { name:'极限关', target:500,  baseSpeed:220, spawnInterval: 650, bombChance:0.18 },
];

const ROUND_TIME = 45; // 每关秒数

// ==================== DOM ====================
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const wrapper = document.getElementById('gameWrapper');
const hudEl   = document.getElementById('hud');
const lvlInfo = document.getElementById('levelInfo');
const overlays = {
  start: document.getElementById('startScreen'),
  win:   document.getElementById('winScreen'),
  lose:  document.getElementById('loseScreen'),
  clear: document.getElementById('clearScreen'),
};

// ==================== 音效系统 ====================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function createNoiseBuffer(dur) {
  const ac = audioCtx;
  const len = ac.sampleRate * dur;
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}

function playEatSound(fruitDef, isCombo) {
  ensureAudio();
  const ac = audioCtx, now = ac.currentTime;
  const n = fruitDef.name;

  if (n === '蓝莓') {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type='sine';
    o.frequency.setValueAtTime(1400,now);
    o.frequency.exponentialRampToValueAtTime(1800,now+0.02);
    o.frequency.exponentialRampToValueAtTime(800,now+0.1);
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.4,now+0.008);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
    o.start(now); o.stop(now+0.15);
  }
  else if (n === '草莓') {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination); o.type='sine';
    o.frequency.setValueAtTime(600,now);
    o.frequency.exponentialRampToValueAtTime(1100,now+0.04);
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.35,now+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.18);
    o.start(now); o.stop(now+0.2);
    const o2 = ac.createOscillator(), g2 = ac.createGain();
    o2.connect(g2); g2.connect(ac.destination); o2.type='triangle';
    o2.frequency.setValueAtTime(900,now+0.06);
    o2.frequency.exponentialRampToValueAtTime(1300,now+0.1);
    g2.gain.setValueAtTime(0,now+0.06);
    g2.gain.linearRampToValueAtTime(0.25,now+0.07);
    g2.gain.exponentialRampToValueAtTime(0.001,now+0.16);
    o2.start(now+0.06); o2.stop(now+0.2);
  }
  else if (n === '葡萄') {
    const ns = ac.createBufferSource();
    ns.buffer = createNoiseBuffer(0.2);
    const f = ac.createBiquadFilter(), g = ac.createGain();
    ns.connect(f); f.connect(g); g.connect(ac.destination);
    f.type='bandpass';
    f.frequency.setValueAtTime(2000,now);
    f.frequency.exponentialRampToValueAtTime(600,now+0.15);
    f.Q.value=1.5;
    g.gain.setValueAtTime(0.4,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
    ns.start(now); ns.stop(now+0.22);
  }
  else if (n === '苹果') {
    const o = ac.createOscillator(), f = ac.createBiquadFilter(), g = ac.createGain();
    o.connect(f); f.connect(g); g.connect(ac.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(300,now);
    o.frequency.exponentialRampToValueAtTime(1200,now+0.015);
    o.frequency.exponentialRampToValueAtTime(200,now+0.08);
    f.type='highpass'; f.frequency.value=400;
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.45,now+0.005);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.1);
    o.start(now); o.stop(now+0.12);
    const o2 = ac.createOscillator(), f2 = ac.createBiquadFilter(), g2 = ac.createGain();
    o2.connect(f2); f2.connect(g2); g2.connect(ac.destination);
    o2.type='square';
    o2.frequency.setValueAtTime(800,now+0.04);
    o2.frequency.exponentialRampToValueAtTime(400,now+0.1);
    f2.type='bandpass'; f2.frequency.value=600; f2.Q.value=2;
    g2.gain.setValueAtTime(0,now+0.04);
    g2.gain.linearRampToValueAtTime(0.3,now+0.045);
    g2.gain.exponentialRampToValueAtTime(0.001,now+0.14);
    o2.start(now+0.04); o2.stop(now+0.16);
  }
  else if (n === '橙子') {
    const ns = ac.createBufferSource();
    ns.buffer = createNoiseBuffer(0.25);
    const f = ac.createBiquadFilter(), g = ac.createGain();
    ns.connect(f); f.connect(g); g.connect(ac.destination);
    f.type='lowpass';
    f.frequency.setValueAtTime(3000,now);
    f.frequency.exponentialRampToValueAtTime(400,now+0.15);
    f.Q.value=5;
    g.gain.setValueAtTime(0.5,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
    ns.start(now); ns.stop(now+0.28);
  }
  else if (n === '西瓜') {
    const o = ac.createOscillator(), f = ac.createBiquadFilter(), g = ac.createGain();
    o.connect(f); f.connect(g); g.connect(ac.destination);
    o.type='triangle';
    o.frequency.setValueAtTime(120,now);
    o.frequency.exponentialRampToValueAtTime(80,now+0.15);
    o.frequency.exponentialRampToValueAtTime(60,now+0.35);
    f.type='lowpass'; f.frequency.value=300;
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.5,now+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.4);
    o.start(now); o.stop(now+0.45);
    const o2 = ac.createOscillator(), f2 = ac.createBiquadFilter(), g2 = ac.createGain();
    o2.connect(f2); f2.connect(g2); g2.connect(ac.destination);
    o2.type='sawtooth';
    o2.frequency.setValueAtTime(200,now+0.03);
    o2.frequency.exponentialRampToValueAtTime(100,now+0.15);
    f2.type='highpass'; f2.frequency.value=80;
    g2.gain.setValueAtTime(0,now+0.03);
    g2.gain.linearRampToValueAtTime(0.35,now+0.04);
    g2.gain.exponentialRampToValueAtTime(0.001,now+0.2);
    o2.start(now+0.03); o2.stop(now+0.22);
  }

  // Combo 和声
  if (isCombo) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination); o.type='sine';
    const bf = fruitDef.weight < 1 ? 1200 : fruitDef.weight < 3 ? 600 : 300;
    o.frequency.setValueAtTime(bf,now+0.04);
    o.frequency.exponentialRampToValueAtTime(bf*1.8,now+0.18);
    g.gain.setValueAtTime(0,now+0.04);
    g.gain.linearRampToValueAtTime(0.2,now+0.06);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
    o.start(now+0.04); o.stop(now+0.28);
  }
}

/** 炸弹爆炸音效 */
function playBombSound() {
  ensureAudio();
  const ac = audioCtx, now = ac.currentTime;
  // 低频轰鸣
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type='sawtooth';
  o.frequency.setValueAtTime(150,now);
  o.frequency.exponentialRampToValueAtTime(30,now+0.3);
  g.gain.setValueAtTime(0.5,now);
  g.gain.exponentialRampToValueAtTime(0.001,now+0.4);
  o.start(now); o.stop(now+0.45);
  // 噪声爆裂
  const ns = ac.createBufferSource();
  ns.buffer = createNoiseBuffer(0.3);
  const f = ac.createBiquadFilter(), g2 = ac.createGain();
  ns.connect(f); f.connect(g2); g2.connect(ac.destination);
  f.type='lowpass'; f.frequency.value=800;
  g2.gain.setValueAtTime(0.6,now);
  g2.gain.exponentialRampToValueAtTime(0.001,now+0.35);
  ns.start(now); ns.stop(now+0.4);
}

function playWinSound() {
  ensureAudio();
  const ac = audioCtx;
  [523,659,784,1047].forEach((freq,i)=>{
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination); o.type='sine';
    const t=ac.currentTime+i*0.13;
    o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.3,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
    o.start(t); o.stop(t+0.3);
  });
}

function playLoseSound() {
  ensureAudio();
  const ac = audioCtx;
  [330,277,220,185].forEach((freq,i)=>{
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination); o.type='sawtooth';
    const f=ac.createBiquadFilter();
    o.connect(f); f.connect(g);
    f.type='lowpass'; f.frequency.value=600;
    const t=ac.currentTime+i*0.18;
    o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.25,t+0.03);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    o.start(t); o.stop(t+0.4);
  });
}

/** 倒计时紧迫音效：最后5秒音调逐秒升高，最后3秒更急促 */
function playTickSound(secondsLeft) {
  ensureAudio();
  const ac = audioCtx, now = ac.currentTime;
  // 越接近0音调越高：10s→440Hz, 1s→1200Hz
  const freq = 440 + (10 - secondsLeft) * 84;
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = secondsLeft <= 3 ? 'square' : 'sine';
  o.frequency.setValueAtTime(freq, now);
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(secondsLeft <= 3 ? 0.35 : 0.2, now + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, now + (secondsLeft <= 3 ? 0.15 : 0.1));
  o.start(now); o.stop(now + 0.2);

  // 最后3秒额外叠加低频心跳
  if (secondsLeft <= 3) {
    const o2 = ac.createOscillator(), g2 = ac.createGain();
    o2.connect(g2); g2.connect(ac.destination);
    o2.type = 'sine';
    o2.frequency.setValueAtTime(80, now);
    g2.gain.setValueAtTime(0, now);
    g2.gain.linearRampToValueAtTime(0.3, now + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    o2.start(now); o2.stop(now + 0.3);
  }
}

// ==================== 游戏状态 ====================
let state = 'start'; // start | playing | win | lose | clear
let level = 0, score = 0, timeLeft = ROUND_TIME;
let mouseX = CX, mouseY = CY - 60;
let projectiles = []; // 水果+炸弹
let particles = [];
let floatingTexts = [];
let spawnTimer = 0, countdownTimer = null;
let combo = 0, comboTimer = 0;
let screenFlash = 0; // 炸弹红色闪烁

const PLAYER = {
  x: CX, y: CY,
  bodyR: 28, headR: 20,
  headAngle: 0, headDist: 38,
};

// ==================== 鼠标 ====================
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (W / r.width);
  mouseY = (e.clientY - r.top) * (H / r.height);
});

// ==================== 事件绑定（用 addEventListener 代替 onclick） ====================
document.getElementById('btnStart').addEventListener('click', () => {
  ensureAudio();
  level = 0;
  hideAllOverlays();
  beginRound();
});
document.getElementById('btnNext').addEventListener('click', () => {
  hideAllOverlays();
  level++;
  beginRound();
});
document.getElementById('btnRetry').addEventListener('click', () => {
  hideAllOverlays();
  beginRound();
});
document.getElementById('btnRestart1').addEventListener('click', backToStart);
document.getElementById('btnRestart2').addEventListener('click', backToStart);
document.getElementById('btnRestart3').addEventListener('click', backToStart);

function hideAllOverlays() {
  Object.values(overlays).forEach(el => el.classList.add('hidden'));
}

function showOverlay(key) {
  overlays[key].classList.remove('hidden');
}

function backToStart() {
  hideAllOverlays();
  showOverlay('start');
  state = 'start';
  if (countdownTimer) clearInterval(countdownTimer);
  hudEl.classList.remove('active');
  lvlInfo.classList.remove('active');
}

// ==================== 游戏控制 ====================
function beginRound() {
  state = 'playing';
  score = 0; // 每关重新计算分数
  projectiles = [];
  particles = [];
  floatingTexts = [];
  spawnTimer = 0;
  timeLeft = ROUND_TIME;
  combo = 0; comboTimer = 0;

  const lvl = LEVELS[level];
  document.getElementById('levelVal').textContent = level + 1;
  document.getElementById('targetVal').textContent = lvl.target;
  document.getElementById('levelName').textContent = level + 1;
  document.getElementById('levelDesc').textContent = lvl.name;
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('timerVal').textContent = timeLeft;
  document.getElementById('timerVal').classList.remove('warning');
  hudEl.classList.add('active');
  lvlInfo.classList.add('active');

  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    if (state !== 'playing') return;
    timeLeft--;
    document.getElementById('timerVal').textContent = Math.max(0, timeLeft);
    if (timeLeft <= 10) {
      document.getElementById('timerVal').classList.add('warning');
      playTickSound(timeLeft); // 倒计时紧迫音效
    }
    if (timeLeft <= 0) {
      clearInterval(countdownTimer);
      endRound();
    }
  }, 1000);
}

function endRound() {
  state = 'ended';
  const lvl = LEVELS[level];
  if (score >= lvl.target) {
    if (level >= LEVELS.length - 1) {
      playWinSound();
      setTimeout(playWinSound, 600);
      document.getElementById('clearMsg').textContent = '全关通关！总得分：' + score;
      document.getElementById('clearDetail').textContent =
        '你已通过全部 ' + LEVELS.length + ' 关，你是真正的水果猎手！';
      showOverlay('clear');
    } else {
      playWinSound();
      document.getElementById('winMsg').textContent = '第 ' + (level+1) + ' 关完成！得分 ' + score;
      document.getElementById('winDetail').textContent =
        '目标：' + lvl.target + '  达成：' + score + '  超额：' + (score - lvl.target) + ' 分';
      showOverlay('win');
    }
  } else {
    playLoseSound();
    document.getElementById('loseMsg').textContent = '第 ' + (level+1) + ' 关失败，差 ' + (lvl.target - score) + ' 分';
    document.getElementById('loseDetail').textContent = '目标：' + lvl.target + '  你的得分：' + score;
    showOverlay('lose');
  }
}

// ==================== 生成 ====================
function spawnProjectile() {
  const lvl = LEVELS[level];
  const side = Math.floor(Math.random() * 4);
  const m = 50;
  let sx, sy;
  if (side===0) { sx=Math.random()*W; sy=-m; }
  else if (side===1) { sx=W+m; sy=Math.random()*H; }
  else if (side===2) { sx=Math.random()*W; sy=H+m; }
  else { sx=-m; sy=Math.random()*H; }

  const isBomb = Math.random() < lvl.bombChance;
  const def = isBomb ? BOMB : FRUITS[Math.floor(Math.random()*FRUITS.length)];

  const dx = CX - sx + (Math.random()-0.5)*160;
  const dy = CY - sy + (Math.random()-0.5)*160;
  const len = Math.hypot(dx, dy);
  const speed = lvl.baseSpeed * (def.speedMult || 1.5);
  const vx = (dx/len)*speed, vy = (dy/len)*speed;

  projectiles.push({
    x:sx, y:sy, vx, vy,
    def, isBomb,
    scale:1, eaten:false, alpha:1,
    rot: Math.random()*Math.PI*2,
    rotSpd: (Math.random()-0.5)*4,
  });
}

function spawnParticles(x, y, color, count, big) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2;
    const s = (big?120:80) + Math.random()*(big?250:160);
    particles.push({
      x, y,
      vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      r: (big?4:3) + Math.random()*(big?8:5),
      alpha:1, color,
      life: (big?0.8:0.6) + Math.random()*0.4,
    });
  }
}

function addFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, alpha:1, vy:-60, life:1.2 });
}

// ==================== 碰撞 ====================
function headPos() {
  return {
    x: PLAYER.x + Math.cos(PLAYER.headAngle) * PLAYER.headDist,
    y: PLAYER.y + Math.sin(PLAYER.headAngle) * PLAYER.headDist,
  };
}

function hitTest(p) {
  const h = headPos();
  return dist(p.x, p.y, h.x, h.y) < (p.def.radius + PLAYER.headR - 4);
}
function dist(x1,y1,x2,y2) { return Math.hypot(x2-x1,y2-y1); }

// ==================== 主循环 ====================
let lastTS = 0;

function mainLoop(ts) {
  const dt = Math.min((ts - lastTS) / 1000, 0.05);
  lastTS = ts;

  // --- 更新 ---
  if (state === 'playing') {
    const lvl = LEVELS[level];

    // 头部朝向
    const ta = Math.atan2(mouseY - PLAYER.y, mouseX - PLAYER.x);
    let da = ta - PLAYER.headAngle;
    while (da > Math.PI) da -= Math.PI*2;
    while (da < -Math.PI) da += Math.PI*2;
    PLAYER.headAngle += da * Math.min(dt*14, 1);

    // Combo
    if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }

    // 生成
    spawnTimer += dt * 1000;
    if (spawnTimer >= lvl.spawnInterval) {
      spawnTimer -= lvl.spawnInterval;
      spawnProjectile();
      if (Math.random() < 0.3) spawnProjectile();
    }

    // 炸弹闪烁衰减
    if (screenFlash > 0) screenFlash -= dt * 3;

    // 更新投射物
    projectiles.forEach(p => {
      if (p.eaten) {
        if (p.isBomb) { p.scale += dt*8; p.alpha -= dt*6; }
        else { p.scale += dt*3; p.alpha -= dt*4; }
        return;
      }
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rot += p.rotSpd * dt;

      if (hitTest(p)) {
        p.eaten = true;
        const h = headPos();
        combo++;
        comboTimer = 2.5;

        if (p.isBomb) {
          // 💣 炸弹！
          score = Math.max(0, score + p.def.score); // 扣15分
          combo = 0; // 重置连击
          document.getElementById('scoreVal').textContent = score;
          playBombSound();
          spawnParticles(h.x, h.y, '#ff4400', 30, true);
          spawnParticles(h.x, h.y, '#ffaa00', 20, true);
          spawnParticles(h.x, h.y, '#ff0000', 15, false);
          addFloatingText(h.x - 30, h.y - 20, p.def.score + '分', '#ff3333');
          screenFlash = 1;
          // 屏幕震动
          wrapper.classList.remove('shake');
          void wrapper.offsetWidth; // 触发 reflow 重启动画
          wrapper.classList.add('shake');
        } else {
          // 🍎 水果
          let pts = p.def.score;
          if (combo >= 5) pts = Math.floor(pts * 2);
          else if (combo >= 3) pts = Math.floor(pts * 1.5);
          score += pts;
          document.getElementById('scoreVal').textContent = score;
          playEatSound(p.def, combo >= 3);
          spawnParticles(h.x, h.y, pts >= 12 ? '#ffd700' : '#fff', 16, false);
          const lbl = combo >= 3 ? ('+' + pts + ' x' + combo + '连击！') : ('+' + pts);
          addFloatingText(h.x - 20, h.y - 20, lbl, combo >= 3 ? '#ffd700' : '#a8e063');

          // 实时检测是否达到目标分数，达标立即过关
          if (score >= LEVELS[level].target) {
            clearInterval(countdownTimer);
            endRound();
          }
        }
      }

      // 越界
      if (!p.eaten) {
        const m = 80;
        if (p.x<-m || p.x>W+m || p.y<-m || p.y>H+m) {
          p.eaten = true; p.alpha = 0;
        }
      }
    });

    projectiles = projectiles.filter(p => p.alpha > 0);

    // 粒子
    particles.forEach(p => {
      p.x += p.vx*dt; p.y += p.vy*dt;
      p.vy += 200*dt;
      p.life -= dt; p.alpha = Math.max(0, p.life);
    });
    particles = particles.filter(p => p.life > 0);

    // 浮动文字
    floatingTexts.forEach(ft => {
      ft.y += ft.vy*dt; ft.life -= dt;
      ft.alpha = Math.max(0, ft.life/1.2);
    });
    floatingTexts = floatingTexts.filter(ft => ft.life > 0);
  }

  // --- 渲染 ---
  render();

  requestAnimationFrame(mainLoop);
}

function render() {
  // 背景渐变
  const bg = ctx.createRadialGradient(CX,CY,0,CX,CY,500);
  bg.addColorStop(0,'#12122a'); bg.addColorStop(1,'#050510');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // 炸弹红闪
  if (screenFlash > 0) {
    ctx.fillStyle = 'rgba(255,0,0,' + (screenFlash * 0.3) + ')';
    ctx.fillRect(0,0,W,H);
  }

  // 背景圆环
  for (let r=120; r<400; r+=80) {
    ctx.beginPath();
    ctx.arc(CX,CY,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(100,150,255,0.04)';
    ctx.lineWidth=1;
    ctx.stroke();
  }

  // 投射物
  projectiles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.scale(p.scale, p.scale);

    if (p.def.name === '蓝莓') {
      // 手绘蓝莓（替代🫐，兼容不支持该emoji的系统）
      const r = p.def.radius;
      ctx.shadowColor = '#6366f1'; ctx.shadowBlur = 8;
      // 底部小圆（3颗浆果）
      const drawBerry = (bx, by, br) => {
        const g = ctx.createRadialGradient(bx - br*0.2, by - br*0.3, 0, bx, by, br);
        g.addColorStop(0, '#818cf8'); g.addColorStop(0.6, '#4f46e5'); g.addColorStop(1, '#312e81');
        ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fillStyle = g; ctx.fill();
        // 高光
        ctx.beginPath(); ctx.arc(bx - br*0.25, by - br*0.3, br*0.25, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
      };
      drawBerry(-r*0.35, r*0.15, r*0.55);
      drawBerry(r*0.35, r*0.15, r*0.55);
      drawBerry(0, -r*0.25, r*0.6);
      // 顶部叶子
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#22c55e';
      ctx.beginPath(); ctx.ellipse(0, -r*0.7, r*0.35, r*0.15, -0.2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#16a34a';
      ctx.beginPath(); ctx.ellipse(r*0.1, -r*0.75, r*0.25, r*0.1, 0.3, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.font = (p.def.radius * 1.7) + 'px serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = p.isBomb ? '#ff4400' : '#fff';
      ctx.shadowBlur = p.isBomb ? 12 : 6;
      ctx.fillText(p.def.emoji, 0, 0);
    }
    ctx.restore();
  });

  // 角色
  drawPlayer();

  // 粒子
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.5, p.r), 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // 浮动文字
  floatingTexts.forEach(ft => {
    ctx.save();
    ctx.globalAlpha = ft.alpha;
    ctx.font = 'bold 20px "Segoe UI"';
    ctx.fillStyle = ft.color;
    ctx.shadowColor = ft.color;
    ctx.shadowBlur = 8;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  });

  // 连击
  if (combo >= 3 && comboTimer > 0 && state === 'playing') {
    ctx.save();
    ctx.globalAlpha = Math.min(1, comboTimer*2);
    ctx.font = 'bold 32px "Segoe UI"';
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20;
    ctx.textAlign = 'center';
    ctx.fillText('🔥 ' + combo + ' 连击！', CX, 50);
    ctx.restore();
  }

  // 最后10秒画面倒计时
  if (state === 'playing' && timeLeft <= 10 && timeLeft > 0) {
    ctx.save();
    // 脉冲缩放效果：每秒前半段放大，后半段缩小
    const phase = (performance.now() % 1000) / 1000;
    const scale = 1 + Math.sin(phase * Math.PI) * 0.3;
    ctx.translate(CX, CY - 80);
    ctx.scale(scale, scale);
    ctx.font = 'bold 120px "Segoe UI"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // 最后5秒红色，5-10秒橙色
    const urgent = timeLeft <= 5;
    ctx.fillStyle = urgent ? 'rgba(255,60,60,0.5)' : 'rgba(255,160,40,0.4)';
    ctx.shadowColor = urgent ? '#ff3333' : '#ff8800';
    ctx.shadowBlur = 40;
    ctx.fillText(timeLeft, 0, 0);
    ctx.restore();
  }

  // 准星
  if (state === 'playing') {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(mouseX-12,mouseY); ctx.lineTo(mouseX+12,mouseY);
    ctx.moveTo(mouseX,mouseY-12); ctx.lineTo(mouseX,mouseY+12);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(mouseX,mouseY,5,0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  // idle 状态也画角色跟随鼠标
  if (state === 'start') {
    PLAYER.headAngle = Math.atan2(mouseY - PLAYER.y, mouseX - PLAYER.x);
  }
}

function drawPlayer() {
  const px=PLAYER.x, py=PLAYER.y, a=PLAYER.headAngle;
  const hx = px + Math.cos(a)*PLAYER.headDist;
  const hy = py + Math.sin(a)*PLAYER.headDist;

  ctx.save();

  // 身体
  const bodyG = ctx.createRadialGradient(px,py,0,px,py,PLAYER.bodyR);
  bodyG.addColorStop(0,'#6c9fff'); bodyG.addColorStop(1,'#3060cc');
  ctx.shadowColor='#4080ff'; ctx.shadowBlur=20;
  ctx.beginPath(); ctx.arc(px,py,PLAYER.bodyR,0,Math.PI*2);
  ctx.fillStyle=bodyG; ctx.fill();
  ctx.strokeStyle='rgba(150,200,255,0.6)'; ctx.lineWidth=2; ctx.stroke();

  // 眼睛
  ctx.shadowBlur=0;
  const perp = a + Math.PI/2;
  for (const s of [-1,1]) {
    const ex = px+Math.cos(a)*10+Math.cos(perp)*s*8;
    const ey = py+Math.sin(a)*10+Math.sin(perp)*s*8;
    ctx.beginPath(); ctx.arc(ex,ey,4,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex+Math.cos(a)*1.5,ey+Math.sin(a)*1.5,2,0,Math.PI*2);
    ctx.fillStyle='#111'; ctx.fill();
  }

  // 颈部
  ctx.beginPath();
  ctx.moveTo(px+Math.cos(a)*PLAYER.bodyR, py+Math.sin(a)*PLAYER.bodyR);
  ctx.lineTo(hx-Math.cos(a)*PLAYER.headR, hy-Math.sin(a)*PLAYER.headR);
  ctx.strokeStyle='rgba(150,200,255,0.5)'; ctx.lineWidth=6; ctx.stroke();

  // 头部
  const headG = ctx.createRadialGradient(hx,hy,0,hx,hy,PLAYER.headR);
  headG.addColorStop(0,'#ffe066'); headG.addColorStop(1,'#e07000');
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=18;
  ctx.beginPath(); ctx.arc(hx,hy,PLAYER.headR,0,Math.PI*2);
  ctx.fillStyle=headG; ctx.fill();
  ctx.strokeStyle='rgba(255,230,100,0.8)'; ctx.lineWidth=2.5; ctx.stroke();

  // 嘴巴
  ctx.shadowBlur=0;
  ctx.font='16px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('👄',hx,hy);

  // 碰撞范围虚线
  ctx.beginPath(); ctx.arc(hx,hy,PLAYER.headR+4,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,220,0,0.25)'; ctx.lineWidth=2;
  ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);

  ctx.restore();
}

// ==================== 启动 ====================
lastTS = performance.now();
requestAnimationFrame(mainLoop);
</script>
</body>
